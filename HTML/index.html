<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafetería Aroma</title>
    <link rel="stylesheet" href="../CSS/style.css" />
  </head>

  <body>
    <div class="container">
      <header class="header">
        <h1>Cafetería Aroma</h1>
        <p>El mejor café de la ciudad</p>
      </header>

      <main>
        <h2>Menú</h2>

        <div class="tabla">
          <table class="menu">
            <tr>
              <th>Producto</th>
              <th>Descripción</th>
              <th>Precio</th>
            </tr>

            <tr>
              <td>Café Americano</td>
              <td>Café negro tradicional</td>
              <td>$2</td>
            </tr>

            <tr>
              <td>Cappuccino</td>
              <td>Café con leche y espuma</td>
              <td>$3</td>
            </tr>

            <tr>
              <td>Latte</td>
              <td>Café con leche cremoso</td>
              <td>$3.5</td>
            </tr>

            <tr>
              <td>Chocolate caliente</td>
              <td>Bebida de cacao con leche</td>
              <td>$2.5</td>
            </tr>
          </table>
        </div>
      </main>

      <footer class="footer">
        <p>Dirección: Calle Café #123</p>
        <p>Teléfono: 809-000-0000</p>
      </footer>
    </div>
  </body>
</html>
