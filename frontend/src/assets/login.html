<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión</title>
    <link rel="shortcut icon" href="/favicon.svg" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="wrapper">
      <!-- Panel izquierdo decorativo -->
      <div class="panel-left">
        <div class="orb"></div>
        <div class="panel-left-content">
          <div class="brand-icon">
            <svg
              viewBox="0 0 64 64"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M22 10 Q24 6 22 2"
                stroke="#F2D9A0"
                stroke-width="1.2"
                stroke-linecap="round"
                fill="none"
                opacity="0.5"
              />
              <path
                d="M32 10 Q34 6 32 2"
                stroke="#F2D9A0"
                stroke-width="1.2"
                stroke-linecap="round"
                fill="none"
                opacity="0.5"
              />
              <path
                d="M42 10 Q44 6 42 2"
                stroke="#F2D9A0"
                stroke-width="1.2"
                stroke-linecap="round"
                fill="none"
                opacity="0.5"
              />
              <path
                d="M14 16 L18 52 H46 L50 16 Z"
                stroke="#F2D9A0"
                stroke-width="1.3"
                fill="none"
                opacity="0.85"
              />
              <path
                d="M50 22 Q60 22 60 32 Q60 42 50 42"
                stroke="#F2D9A0"
                stroke-width="1.3"
                fill="none"
                opacity="0.7"
              />
              <ellipse
                cx="32"
                cy="55"
                rx="20"
                ry="3"
                stroke="#F2D9A0"
                stroke-width="1"
                fill="none"
                opacity="0.5"
              />
              <line
                x1="20"
                y1="24"
                x2="44"
                y2="24"
                stroke="#F2D9A0"
                stroke-width="0.7"
                opacity="0.3"
              />
            </svg>
          </div>

          <h1 class="brand-name">Cafetería<br />Aroma</h1>
          <p class="brand-tagline">
            El sabor de siempre,<br />en tu mesa favorita
          </p>
          <div class="divider-ornament"><span></span><i></i><span></span></div>
          <p class="panel-left-quote">
            "Cada taza cuenta una historia.<br />La tuya empieza aquí."
          </p>
        </div>
      </div>

      <!-- Panel derecho — formulario -->
      <div class="panel-right">
        <div class="form-top">
          <p class="form-eyebrow">Bienvenido de vuelta</p>
          <h2 class="form-heading">Iniciar sesión</h2>
          <p class="form-subheading">Accede a tu cuenta para continuar</p>
        </div>

        <form onsubmit="return false;">
          <div class="field">
            <label for="email">Correo electrónico</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="nombre@correo.com"
              autocomplete="off"
            />
            <div class="field-underline"></div>
          </div>
          <div class="field">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
            />
            <div class="field-underline"></div>
          </div>
          <div class="row-options">
            <label class="remember">
              <input type="checkbox" id="remember" />
              <span>Recordarme</span>
            </label>
            <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
          </div>
          <button type="submit" class="btn-login">Entrar</button>
        </form>

        <p class="form-footer">
          ¿No tienes cuenta?
          <a href="/src/assets/registro.html">Regístrate aquí</a>
        </p>
      </div>
    </div>
    <script type="module" src="/src/JS/login.js"></script>
  </body>
</html>
