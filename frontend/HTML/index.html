<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      type="image/png"
      sizes="32x32"
      href="../img/img-main/cafe-ico.ico"
    />
    <title>Cafetería Aroma</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Mea+Culpa&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../CSS/style.css" />
  </head>

  <body>
    <nav class="navbar">
      <h1>Cafeteria Aroma</h1>

     <div class="carrito">

          <svg xmlns="http://www.w3.org/2000/svg"  width="30" height="30" fill="currentColor" class="bi bi-cart2 " viewBox="0 0 16 16">
          <path d="M0 2.5A.5.5 0 0 1 .5 2H2a.5.5 0 0 1 .485.379L2.89 4H14.5a.5.5 0 0 1 .485.621l-1.5 6A.5.5 0 0 1 13 11H4a.5.5 0 0 1-.485-.379L1.61 3H.5a.5.5 0 0 1-.5-.5M3.14 5l1.25 5h8.22l1.25-5zM5 13a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0m9-1a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0"/>
        <span class="cantidad-carrito">0</span>
      </div>
    </nav>

    <main class="main-conteiner">
      <section class="hero">
        <h1>Cafeteria Aroma</h1>
        <p>Donde el aroma del café acompaña tus mejores momentos</p>
      </section>

      <section class="hero2 visible">
        <!-- Bebidas calientes -->
        <div class="section-title">
          <h2>Bebidas calientes</h2>
        </div>

        <div class="carousel-wrapper">
          <button class="prev-caliente">&#10094;</button>
          <div class="container-bebida-caliente"></div>
          <button class="next-caliente">&#10095;</button>
        </div>

        <!-- Bebidas frías -->
        <div class="section-title-2">
          <h2>Bebidas frías</h2>
        </div>

        <div class="carousel-wrapper-2">
          <button class="prev-fria">&#10094;</button>
          <div class="container-bebida-fria"></div>
          <button class="next-fria">&#10095;</button>
        </div>

        <!-- Empanadas -->
        <div class="section-title-2">
          <h2>Empanadas</h2>
        </div>

        <div class="carousel-wrapper-2">
          <button class="prev-empanada">&#10094;</button>
          <div class="container-empanadas"></div>
          <button class="next-empanada">&#10095;</button>
        </div>

        <!-- Panadería -->
        <div class="section-title-2">
          <h2>Panadería</h2>
        </div>

        <div class="carousel-wrapper-2">
          <button class="prev-panaderia">&#10094;</button>
          <div class="container-panaderia"></div>
          <button class="next-panaderia">&#10095;</button>
        </div>

        <!-- 🔥 REPOSTERÍA (YA TENÍAS) -->
        <div class="section-title-2">
          <h2>Repostería</h2>
        </div>

        <div class="carousel-wrapper-2">
          <button class="prev-reposteria">&#10094;</button>
          <div class="container-reposteria"></div>
          <button class="next-reposteria">&#10095;</button>
        </div>

        <!--  SANDWICHES Y WRAPS (AGREGADO) -->
        <div class="section-title-2">
          <h2>Sandwiches y wraps</h2>
        </div>

        <div class="carousel-wrapper-2">
          <button class="prev-sandwich">&#10094;</button>
          <div class="container-sandwiches"></div>
          <button class="next-sandwich">&#10095;</button>
        </div>

      </section>
    </main>

    <footer class="footer">
      <div class="footer-container ">
        <div class="footer-card  direc-Contc">
          <h3>Direccion</h3>
          <p>Calle Café #123</p>
        </div>

        <div class="footer-card direc-Contc">
          <h3>Contacto</h3>
          
          <p>809-000-0000</p>
        </div>

        <div class="footer-card">
          <h3>Horario</h3>
 
          <p>7:00 AM - 10:00 PM</p>
        </div>     
       
      </div>
  <p class="copyright">© 2026 Cafetería Aroma</p>
 
    </footer>

    <script defer src="../JS/index.js"></script>
    <script type="module" src="../JS/bebidasCalientes.js"></script>
    <script type="module" src="../JS/bebidasFrias.js"></script>
    <script type="module" src="../JS/empanadas.js"></script>
    <script type="module" src="../JS/panaderia.js"></script>
    <script type="module" src="../JS/SandwichesWraps.js"></script>
    <script type="module" src="../JS/reposteria.js"></script>
    
  </body>
</html>
